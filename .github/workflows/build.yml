name: Sphinx GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install sphinx pydata-sphinx-theme myst-parser

      - name: Prepare switcher.json for GitHub Pages
        run: |
          BASE="${{ github.event.repository.name }}"
          sed "s/{BASE}/${BASE}/g" _static/switcher.template.json > _static/switcher.json
          sed "s/{BASE}/${BASE}/g" index.template.html > _build/index.html

      # --- JA build ---
      - name: Prepare JA locale
        run: cp docs/vars/ja.rst docs/vars/locale.rst

      - name: Build JA
        run: sphinx-build -b html . _build/ja

      # --- EN build ---
      - name: Prepare EN locale
        run: cp docs/vars/en.rst docs/vars/locale.rst

      - name: Build EN
        run: sphinx-build -b html . _build/en

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build
          publish_branch: built

